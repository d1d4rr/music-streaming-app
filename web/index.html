<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sputify - Music Streaming App">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- CORS and Network - Very permissive for mobile browser compatibility -->
  <!-- Note: CSP removed to allow iTunes API requests on mobile browsers -->

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sputify">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sputify</title>
  <link rel="manifest" href="manifest.json">
  
  <script>
    // Enable console logging for mobile debugging
    if (typeof console === 'undefined') {
      window.console = {
        log: function() {},
        error: function() {},
        warn: function() {},
        info: function() {}
      };
    }
    
    // Log when page loads (helps with mobile debugging)
    console.log('Sputify app loading...');
    console.log('User Agent:', navigator.userAgent);
    console.log('Platform:', navigator.platform);
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
